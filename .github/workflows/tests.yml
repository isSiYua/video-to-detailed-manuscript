name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run deterministic tests
        working-directory: scripts
        run: python -m unittest discover -s tests -q
      - name: Compile source
        working-directory: scripts
        run: python -m compileall -q .
